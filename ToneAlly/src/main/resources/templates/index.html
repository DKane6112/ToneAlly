<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oleo+Script:wght@400;700&display=swap" rel="stylesheet">
    <title>ToneAlly</title>
</head>
<body>
    <div class="gridArea">
        <header id="header">
            <h1><img id="favicon" src="/favicon.ico" alt="ToneAlly Logo">ToneAlly</h1>
        </header>

        <nav id="nav">
            <a id="about" class="navButton" href="/">About</a>
            <a id="analysis" class="navButton" href="/app/analyse">Analyse</a>
            <a id="refresh" class="navButton" href="/">Create</a>
        </nav>
        
        <section id="userInput">
            <form id="myForm">
                <label for="key">Key:</label>
                <select id="key" name="key">
                    <option value="A">A</option>
                    <option value="A#">A#</option>
                    <option value="B">B</option>
                    <option value="C">C</option>
                    <option value="C#">C#</option>
                    <option value="D">D</option>
                    <option value="D#">D#</option>
                    <option value="E">E</option>
                    <option value="F">F</option>
                    <option value="F#">F#</option>
                    <option value="G">G</option>
                    <option value="G#">G#</option>
                </select>
    
                <label for="mood">Mood:</label>
                <select id="mood" name="mood">
                    <option value="major">Happy</option>
                    <option value="minor">Sad</option>
                </select>

                <label for="genre">Genre:</label>
                <select id="genre" name="genre">
                    <option value="rock">Rock</option>
                    <option value="pop">Pop</option>
                    <option value="jazz">Jazz</option>
                </select>
    
                <button type="button" id="submit">Submit</button>
            </form>
        </section>
    

        <div id="result">
            <div id="scales">
                <label for="ChromaticScale">Chromatic Scale:</label>
                <p id="ChromaticScale"></p>
    
                <label for="MajorScale">Major Scale:</label>
                <p id="MajorScale"></p>
    
                <label for="MinorScale">Minor Scale:</label>
                <p id="MinorScale"></p>
            </div>

            <div id="chords">
                <label for="chordNames">Chord Progression: </label>
                <div id="chordNames">
                    <div class="chordName">
                    <p id="I">
                    </p>
                        <div class="image-container" id="imgI">
                            <img src="/img/chords/Amajor.png" alt="A Major Chord Diagram" id="firstChordImage">
                        </div>
                    </div>

                    <div class="chordName">
                    <p id="II"></p>
                        <div class="image-container" id="imgII">
                            <img src="/img/chords/Amajor.png" alt="A Major Chord Diagram" id="secondChordImage">
                        </div>
                    </div>

                    <div class="chordName">
                    <p id="III"></p>
                        <div class="image-container" id="imgIII">
                            <img src="/img/chords/Amajor.png" alt="A Major Chord Diagram" id="thirdChordImage">
                        </div>
                    </div>

                    <div class="chordName">
                    <p id="IV"></p>
                        <div class="image-container" id="imgIV">
                            <img src="/img/chords/Amajor.png" alt="Chord Diagram" id="fourthChordImage">
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <footer>
            <div>
                <a href="#"><img src="/img/li.png" alt="Linkedin Icon" class="icon"></a>
                <a href="#"><img src="/img/gh.png" alt="gitHub Icon" class="icon"></a>
                <a href="#"><img src="/img/insta.png" alt="Instagram Icon" class="icon"></a>
                <a href="#"><img src="/img/twit.png" alt="Twitter Icon" class="icon"></a>
                <a href="#"><img src="/img/fbook.png" alt="Facebook Icon" class="icon"></a>
            </div>
            <p><i>Copyright&copy; 2024 Dylan Kane</i></p>
        </footer>
    </div>
    <script src="/script.js"></script>
</body>
</html>
